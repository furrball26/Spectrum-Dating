name: Server CI

# Backend lint + test gate. The backend lives under server/ in this monorepo,
# so every step runs with working-directory: server and the job only fires on
# server-only changes (path filter below). Lifted from the pre-merge
# spectrum-dating-server repo's own CI.
on:
  push:
    branches: [master]
    paths:
      - "server/**"
  pull_request:
    branches: [master]
    paths:
      - "server/**"

defaults:
  run:
    working-directory: server

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Matches server/package.json engines (>=20).
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Lint is non-blocking: it surfaces the tech-debt baseline (unused vars,
      # etc.) without failing the build while that backlog is worked down.
      # Flip `continue-on-error` to false to make lint gating.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      # Tests ARE blocking — a red test fails CI.
      - name: Test
        run: npm test
