    <!-- Pre-paint theme bootstrap: set data-theme from the saved preference
         BEFORE the first paint so nobody gets a flash of the wrong theme.
         Mirrors readA11y() in src/a11yPrefs.js exactly: known ids apply,
         "light" clears the attribute, anything else falls back to dim. -->
    <script>
      (function () {
        var th = "dim";
        try {
          var p = JSON.parse(localStorage.getItem("spectrum_a11y") || "null");
          var v = p && typeof p.theme === "string" ? p.theme : "dim";
          th = ["dim", "navy", "lightblue", "pink"].indexOf(v) >= 0 ? v : (v === "light" ? "" : "dim");
        } catch (e) { /* fall through to dim */ }
        document.documentElement.dataset.theme = th;
      })();
    </script>
    <style>
      /* ── Theme color variables ───────────────────────────────────────────
         Light is the default (:root). The warm dim theme activates when
         <html data-theme="dim">. tokens.js references these via var(--c-*)
         with the light hex as a fallback, so the LIGHT values here MUST match
         tokens.js exactly. Every variable defined for light has a dim value. */
      :root {
        /* Warm paper base — deliberately a step warmer than the old cool gray-
           green so white cards visibly lift off it (figure/ground). */
        --c-bg: #F5F3EE;
        --c-bg-gradient: linear-gradient(150deg, #F6F4EF 0%, #EBEFE7 100%);
        --c-surface: #FFFFFF;
        --c-surfaceAlt: #EEF1ED;
        /* Card edge — deeper than --c-border so card boundaries actually read
           (the old #D3DBD5 measured ~1.3:1 on white and dissolved). Decorative
           edge; elevation is carried by the shadow tokens below. */
        --c-cardBorder: #C7D2CA;
        /* ── Elevation (theme-aware). Light: soft green-tinted two-layer shadows.
           sm = list cards, md = primary/raised cards, lg = modals/overlays. */
        --sh-sm: 0 1px 2px rgba(36,51,45,0.06), 0 3px 10px rgba(36,51,45,0.08);
        --sh-md: 0 2px 4px rgba(36,51,45,0.07), 0 12px 28px rgba(36,51,45,0.11);
        --sh-lg: 0 4px 12px rgba(36,51,45,0.10), 0 24px 48px rgba(36,51,45,0.15);
        /* Warm accent for TEXT (eyebrows, section labels): --c-clay (#C9A875) is
           decorative-only (fails 4.5:1); this darker bronze passes on white/bg. */
        --c-clayText: #8A6B3E;
        /* ── Brand mark tiles (SpectrumMark / Spectrum / AnimatedSpectrumMark).
           Defined ONCE (not overridden in dim — the logo stays constant across
           themes). Re-palette the brand by editing these six. */
        --mark-1: #5E9459;
        --mark-2: #4F8A8B;
        --mark-3: #3E6660;
        --mark-4: #6FA39A;
        --mark-5: #C9A875;
        --mark-6: #E7D9C4;
        --c-text: #24332D;
        --c-textSoft: #4E5F58;
        --c-textMuted: #5F6F67;
        --c-accent: #5B8A82;
        --c-accentStrong: #3E6660;
        --c-accentFill: #3E6660;
        --c-positive: #5E9459;
        --c-positiveFill: #3F7A38;
        --c-border: #D3DBD5;
        --c-borderLight: #E8EDE7;
        --c-focus: #24332D;
        --c-danger: #B94040;
        --c-dangerFill: #B94040;
        --c-positiveText: #4C7A47;
        --c-warning: #B8860B;
        --c-warningFill: #8A6508;
        /* D32 — warning-tinted border with ≥3:1 non-text contrast (WCAG 1.4.11)
           against sand (#E7D9C4, 3.79:1) and surfaceAlt (#EEF1ED, 4.53:1). The
           lighter --c-warning failed at 2.3–2.9:1 as a border in light theme. */
        --c-warningBorder: #8A6508;
        --c-mutedFill: #566860;
        --c-dangerSurface: #FBF1F1;
        --c-warningSurface: #FBF6E9;
        --c-warningSurfaceText: #6E5206;
        --c-sand: #E7D9C4;
        --c-clay: #C9A875;
        --c-teal: #4F8A8B;
        --c-green50: #EEF3F1;
        --c-green100: #DCE8E4;
        --c-green200: #BCD4CC;
        --c-green300: #9BBFB4;
        --c-green400: #6FA39A;
        --c-green500: #5B8A82;
        --c-green600: #4A7570;
        --c-green700: #3E6660;
        --c-green800: #314E49;
        --c-green900: #24332D;
        --c-formBorder: #78877F;
        --c-bubbleOwn: #D6E4DC;
        --c-bubbleOwnBorder: #AFCABD;
        --c-bubbleOther: #FFFFFF;
        --c-tombstone: #5F6F67;
        /* Modal/sheet scrim RGB triplet — used as rgba(var(--c-scrimRgb), a)
           so each overlay keeps its own opacity but the hue follows the theme
           (the old hardcoded green-black rgba(36,51,45,…) read wrong off-brand
           on non-green themes — same bug class the --sh-* migration fixed). */
        --c-scrimRgb: 36, 51, 45;
      }
      :root[data-theme="dim"] {
        /* Deeper bg + slightly lifted surfaces = real figure/ground in dim. */
        --c-bg: #181F1D;
        --c-bg-gradient: linear-gradient(150deg, #181F1D 0%, #151B19 100%);
        --c-surface: #26312D;
        --c-surfaceAlt: #2C3834;
        --c-cardBorder: #3E4D47;
        /* Dim elevation must be black-based — green-tinted shadows vanish on a
           dark field (the old hardcoded rgba(36,51,45,…) shadows were invisible
           in dim; these are the theme-aware fix). */
        --sh-sm: 0 1px 2px rgba(0,0,0,0.28), 0 3px 10px rgba(0,0,0,0.32);
        --sh-md: 0 2px 4px rgba(0,0,0,0.30), 0 12px 28px rgba(0,0,0,0.42);
        --sh-lg: 0 4px 12px rgba(0,0,0,0.36), 0 24px 48px rgba(0,0,0,0.52);
        --c-clayText: #D9BE8E;
        --c-text: #E4EAE6;
        --c-textSoft: #B6C2BC;
        --c-textMuted: #95A29A;
        --c-accent: #7FB0A7;
        --c-accentStrong: #8FBCB2;
        --c-accentFill: #356962;
        --c-positive: #7FB87A;
        --c-positiveFill: #2F6A2A;
        --c-border: #33403B;
        --c-borderLight: #2C3733;
        --c-focus: #E4EAE6;
        --c-danger: #E08585;
        --c-dangerFill: #9E3B3B;
        --c-positiveText: #7FB87A;
        --c-warning: #D9B45A;
        --c-warningFill: #806508;
        /* D32 — in dim the lighter amber reads as a clear border on the dark
           surfaceAlt (#283330, 7.1:1) and sand (#3A352B), so reuse it here. */
        --c-warningBorder: #D9B45A;
        --c-mutedFill: #566860;
        --c-dangerSurface: #3A2626;
        --c-warningSurface: #33301E;
        --c-warningSurfaceText: #E9DFC0;
        --c-sand: #3A352B;
        --c-clay: #C9A875;
        --c-teal: #6FA39A;
        /* Green ramp: dark surfaces at the low end (50→200 become deep panels),
           lighter brand greens at the high end for text/accents on dark. */
        --c-green50: #202825;
        --c-green100: #25302C;
        --c-green200: #2E3B36;
        --c-green300: #3C4F49;
        --c-green400: #5E867D;
        --c-green500: #7FB0A7;
        --c-green600: #8FBCB2;
        --c-green700: #9FC8BE;
        --c-green800: #B6D4CB;
        --c-green900: #E4EAE6;
        --c-formBorder: #647A70;
        --c-bubbleOwn: #33423C;
        --c-bubbleOwnBorder: #46584F;
        /* Tracks --c-surface (other-person bubbles read as surface cards). */
        --c-bubbleOther: #26312D;
        --c-tombstone: #8A988F;
        --c-scrimRgb: 0, 0, 0;
      }
      /* ── Navy — the second dark theme: desaturated slate-navy, soft blue

        --c-text: #E5EAF3;
        --c-textSoft: #B4C0D4;

        --c-accent: #8FAEDB;
        --c-accentStrong: #A4BEE6;
        --c-accentFill: #33518A;
        --c-positive: #86BE8C;
        --c-positiveFill: #2F6A3A;
        --c-border: #2C3A55;
        --c-borderLight: #25314A;
        --c-focus: #E5EAF3;
        --c-danger: #E39090;
        --c-dangerFill: #A03D3D;
        --c-positiveText: #86BE8C;
        --c-warning: #D9B45A;
        --c-warningFill: #806508;
        --c-warningBorder: #D9B45A;
        --c-mutedFill: #566275;
        --c-dangerSurface: #392626;
        --c-warningSurface: #33301E;
        --c-warningSurfaceText: #E9DFC0;
        --c-sand: #3A352B;
        --c-clay: #C9A875;
        --c-teal: #6FA39A;
        --c-green50: #1A2438;
        --c-green100: #202C46;
        --c-green200: #283757;
        --c-green300: #33456C;
        --c-green400: #5F7BA8;
        --c-green500: #8FAEDB;

      }
      /* ── Light blue — cool blue-gray paper, steel-blue accent. Warm labels
         (sand/clay/warning) deliberately keep their light-theme values. */
      :root[data-theme="lightblue"] {
        --c-bg: #F2F5F9;
        --c-bg-gradient: linear-gradient(150deg, #F4F7FA 0%, #E9EFF5 100%);

        --c-surfaceAlt: #EAF0F6;
        --c-cardBorder: #BFCEDC;

        --c-clayText: #8A6B3E;
        --c-text: #22303F;
        --c-textSoft: #48586A;
        --c-textMuted: #5B6C7E;

        --c-accentStrong: #2F5675;
        --c-accentFill: #2F5675;
        --c-positive: #5E9459;
        --c-positiveFill: #3F7A38;
        --c-border: #CFDAE4;
        --c-borderLight: #E3EAF1;

        --c-danger: #B44343;
        --c-dangerFill: #B44343;
        --c-positiveText: #4C7A47;
        --c-warning: #B8860B;
        --c-warningFill: #8A6508;
        --c-warningBorder: #8A6508;
        --c-mutedFill: #556472;
        --c-dangerSurface: #FAF0F0;
        --c-warningSurface: #FBF6E9;
        --c-warningSurfaceText: #6E5206;
        --c-sand: #E7D9C4;
        --c-clay: #C9A875;
        --c-teal: #4F8A8B;
        --c-green50: #EDF2F7;
        --c-green100: #DEE8F0;
        --c-green200: #C2D5E4;
        --c-green300: #A0BDD3;
        --c-green400: #6F94B0;
        --c-green500: #43708F;

        --c-bubbleOwn: #DCE8F2;

        --c-bubbleOther: #FFFFFF;

      }
      /* ── Pink ("Blush") — blush paper, DUSTY-ROSE accent, deliberately
         mauve-shifted so the true-red danger states stay unmistakable.
         Readable pink on pastel means wine/plum text ramps (AA-checked). */
      :root[data-theme="pink"] {
        --c-bg: #FAF3F2;
        --c-bg-gradient: linear-gradient(150deg, #FBF4F3 0%, #F3E9E9 100%);
        --c-surface: #FFFFFF;
        --c-surfaceAlt: #F4E9E8;
        --c-cardBorder: #D8C2C8;
        --sh-sm: 0 1px 2px rgba(52,40,44,0.06), 0 3px 10px rgba(52,40,44,0.08);
        --sh-md: 0 2px 4px rgba(52,40,44,0.07), 0 12px 28px rgba(52,40,44,0.11);
        --sh-lg: 0 4px 12px rgba(52,40,44,0.10), 0 24px 48px rgba(52,40,44,0.15);
        --c-clayText: #8A6B3E;
        --c-text: #372B2F;
        --c-textSoft: #645159;
        --c-textMuted: #77626B;
        --c-accent: #A05A70;
        --c-accentStrong: #8A4560;
        --c-accentFill: #8A4560;
        --c-positive: #5E9459;
        --c-positiveFill: #3F7A38;
        --c-border: #E4D3D6;
        --c-borderLight: #F0E4E6;
        --c-focus: #372B2F;
        --c-danger: #B23A3A;
        --c-dangerFill: #B23A3A;
        --c-positiveText: #4C7A47;
        --c-warning: #B8860B;
        --c-warningFill: #8A6508;
        --c-warningBorder: #8A6508;
        --c-mutedFill: #6E5A62;
        --c-dangerSurface: #FBEFEF;
        --c-warningSurface: #FBF6E9;
        --c-warningSurfaceText: #6E5206;
        --c-sand: #E7D9C4;
        --c-clay: #C9A875;
        --c-teal: #4F8A8B;
        --c-green50: #F7EDEE;
        --c-green100: #EFDEE1;
        --c-green200: #E2C6CC;
        --c-green300: #D0A8B2;
        --c-green400: #B27E90;
        --c-green500: #A05A70;
        --c-green600: #945064;
        --c-green700: #8A4560;
        --c-green800: #6E3750;
        --c-green900: #372B2F;
        --c-formBorder: #94787F;
        --c-bubbleOwn: #F5DFE3;

      }
      *, *::before, *::after { box-sizing: border-box; }
      img, svg { max-width: 100%; }
      html, body, #root { height: 100%; margin: 0; }
      /* Remove the ~300ms double-tap-to-zoom gesture (a common source of
         accidental zoom that then leaves the layout stuck mid-zoom) WITHOUT
         disabling pinch-to-zoom. `manipulation` keeps panning + pinch-zoom and
         only drops double-tap-zoom + tap-delay — so WCAG 1.4.4 zoom is intact
         (no user-scalable=no / maximum-scale here — see the viewport meta). */
      #root { touch-action: manipulation; }
      /* Lock the page to vertical scrolling only — no horizontal scrollbar and
         no left/right rubber-band / two-finger swipe-to-navigate pull. */
      html, body {
        overflow-x: hidden;
        max-width: 100%;
        overscroll-behavior-x: none;
      }
      /* Skip-to-content link: off-screen until focused (bulletproof CSS :focus,
         no JS state). Revealed top-left when a keyboard user tabs to it. */
      .skip-link {
        position: absolute; left: -9999px; top: auto; z-index: 200;
        background: var(--c-surface, #fff); color: var(--c-accentStrong, #3E6660);
        border: 2px solid var(--c-accentStrong, #3E6660); border-radius: 8px;
        padding: 10px 16px; font-weight: 600; text-decoration: none;
      }
      .skip-link:focus { left: 12px; top: 12px; }
      /* Visually-hidden but exposed to assistive tech (accessible-name helpers). */
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      /* Paint the ROOT element too: iOS Safari derives its under-page backdrop
         (shown during overscroll / keyboard viewport mismatches) from the html
         element's background. With html transparent it fell back to the UA
         backdrop — pure black in dark appearance — producing a black void
         below content after keyboard dismiss (bug IMG_3119). */
      html {
        background: var(--c-bg, #F5F3EE);
      }
      body {
        background: var(--c-bg, #F5F3EE);
        font-family: 'Atkinson Hyperlegible', -apple-system, Segoe UI, Roboto, sans-serif;
        overflow-x: hidden;
      }
    </style>
