<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spectrum Dating</title>
    <meta name="description" content="Dating at your own pace." />
    <meta name="theme-color" content="#3E6660" />

    <!-- Open Graph / social share -->
    <meta property="og:title" content="Spectrum — Dating at your own pace." />
    <meta property="og:description" content="A calmer way to meet people. Match, then message whenever you're ready — there's no rush." />
    <meta property="og:image" content="https://spectrum-dating-eta.vercel.app/og.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://spectrum-dating-eta.vercel.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Spectrum — Dating at your own pace." />
    <meta name="twitter:description" content="A calmer way to meet people. Match, then message whenever you're ready — there's no rush." />
    <meta name="twitter:image" content="https://spectrum-dating-eta.vercel.app/og.png" />

    <link rel="manifest" href="/manifest.json" />
    <!-- Modern default: scalable SVG. PNG fallbacks cover browsers/tabs that
         want a classic raster favicon; mask-icon covers Safari pinned tabs. -->
    <link rel="icon" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="mask-icon" href="/icon.svg" color="#3E6660" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Spectrum" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Newsreader:opsz,wght@6..72,400;6..72,600;6..72,700&display=swap"
    />
    <style>
      /* ── Theme color variables ───────────────────────────────────────────
         Light is the default (:root). The warm dim theme activates when
         <html data-theme="dim">. tokens.js references these via var(--c-*)
         with the light hex as a fallback, so the LIGHT values here MUST match
         tokens.js exactly. Every variable defined for light has a dim value. */
      :root {
        --c-bg: #F4F5F2;
        --c-bg-gradient: linear-gradient(150deg, #F4F5F2 0%, #ECF0EB 100%);
        --c-surface: #FFFFFF;
        --c-surfaceAlt: #EEF1ED;
        --c-text: #24332D;
        --c-textSoft: #4E5F58;
        --c-textMuted: #5F6F67;
        --c-accent: #5B8A82;
        --c-accentStrong: #3E6660;
        --c-accentFill: #3E6660;
        --c-positive: #5E9459;
        --c-border: #D3DBD5;
        --c-borderLight: #E8EDE7;
        --c-focus: #24332D;
        --c-danger: #B94040;
        --c-dangerFill: #B94040;
        --c-positiveText: #4C7A47;
        --c-warning: #B8860B;
        --c-sand: #E7D9C4;
        --c-clay: #C9A875;
        --c-teal: #4F8A8B;
        --c-green50: #EEF3F1;
        --c-green100: #DCE8E4;
        --c-green200: #BCD4CC;
        --c-green300: #9BBFB4;
        --c-green400: #6FA39A;
        --c-green500: #5B8A82;
        --c-green600: #4A7570;
        --c-green700: #3E6660;
        --c-green800: #314E49;
        --c-green900: #24332D;
        --c-formBorder: #8A9E96;
        --c-bubbleOwn: #D6E4DC;
        --c-bubbleOwnBorder: #AFCABD;
        --c-bubbleOther: #FFFFFF;
        --c-tombstone: #7A8C85;
      }
      :root[data-theme="dim"] {
        --c-bg: #1C2422;
        --c-bg-gradient: linear-gradient(150deg, #1C2422 0%, #19211F 100%);
        --c-surface: #232D2A;
        --c-surfaceAlt: #283330;
        --c-text: #E4EAE6;
        --c-textSoft: #B6C2BC;
        --c-textMuted: #95A29A;
        --c-accent: #7FB0A7;
        --c-accentStrong: #8FBCB2;
        --c-accentFill: #356962;
        --c-positive: #7FB87A;
        --c-border: #33403B;
        --c-borderLight: #2C3733;
        --c-focus: #E4EAE6;
        --c-danger: #E08585;
        --c-dangerFill: #9E3B3B;
        --c-positiveText: #7FB87A;
        --c-warning: #D9B45A;
        --c-sand: #3A352B;
        --c-clay: #C9A875;
        --c-teal: #6FA39A;
        /* Green ramp: dark surfaces at the low end (50→200 become deep panels),
           lighter brand greens at the high end for text/accents on dark. */
        --c-green50: #202825;
        --c-green100: #25302C;
        --c-green200: #2E3B36;
        --c-green300: #3C4F49;
        --c-green400: #5E867D;
        --c-green500: #7FB0A7;
        --c-green600: #8FBCB2;
        --c-green700: #9FC8BE;
        --c-green800: #B6D4CB;
        --c-green900: #E4EAE6;
        --c-formBorder: #4A5C55;
        --c-bubbleOwn: #33423C;
        --c-bubbleOwnBorder: #46584F;
        --c-bubbleOther: #232D2A;
        --c-tombstone: #8A988F;
      }
      *, *::before, *::after { box-sizing: border-box; }
      img, svg { max-width: 100%; }
      html, body, #root { height: 100%; margin: 0; }
      /* Lock the page to vertical scrolling only — no horizontal scrollbar and
         no left/right rubber-band / two-finger swipe-to-navigate pull. */
      html, body {
        overflow-x: hidden;
        max-width: 100%;
        overscroll-behavior-x: none;
      }
      /* Skip-to-content link: off-screen until focused (bulletproof CSS :focus,
         no JS state). Revealed top-left when a keyboard user tabs to it. */
      .skip-link {
        position: absolute; left: -9999px; top: auto; z-index: 200;
        background: var(--c-surface, #fff); color: var(--c-accentStrong, #3E6660);
        border: 2px solid var(--c-accentStrong, #3E6660); border-radius: 8px;
        padding: 10px 16px; font-weight: 600; text-decoration: none;
      }
      .skip-link:focus { left: 12px; top: 12px; }
      body {
        background: var(--c-bg, #F4F5F2);
        font-family: 'Atkinson Hyperlegible', -apple-system, Segoe UI, Roboto, sans-serif;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
